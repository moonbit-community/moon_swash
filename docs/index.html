<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>moon_swash SVG Shaping Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f7f3;
        --ink: #15201b;
        --muted: #5a6b62;
        --card: #ffffff;
        --line: #d6e0d9;
        --accent: #0f7a44;
        --accent-2: #0a5b91;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 0% 0%, #d8efe2 0, transparent 28%),
          radial-gradient(circle at 100% 100%, #d7e8f7 0, transparent 32%),
          var(--bg);
      }

      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 32px 20px 40px;
      }

      .title {
        margin: 0;
        font-weight: 600;
        letter-spacing: 0.01em;
        font-size: clamp(1.6rem, 2.4vw, 2.2rem);
      }

      .sub {
        margin: 10px 0 24px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: 340px minmax(0, 1fr);
        gap: 18px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 25px rgba(17, 36, 27, 0.06);
      }

      .label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
        color: var(--muted);
      }

      textarea,
      input,
      select,
      button {
        width: 100%;
        font: inherit;
      }

      textarea,
      input,
      select {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        background: #fff;
        color: var(--ink);
      }

      textarea {
        min-height: 140px;
        resize: vertical;
        line-height: 1.45;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 10px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 500;
        cursor: pointer;
      }

      #render {
        background: linear-gradient(135deg, var(--accent), #0f8f4d);
        color: #fff;
      }

      #download {
        background: linear-gradient(135deg, var(--accent-2), #2e74a7);
        color: #fff;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .meta {
        margin-top: 10px;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .status {
        font-size: 0.9rem;
        margin-bottom: 10px;
        color: var(--muted);
      }

      .viewer {
        width: 100%;
        min-height: 420px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        overflow: auto;
        padding: 14px;
      }

      .viewer svg {
        width: auto;
        height: auto;
        max-width: none;
        display: block;
      }

      .code {
        margin-top: 12px;
        border-radius: 10px;
        background: #13221b;
        color: #d5f8e4;
        font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.78rem;
        padding: 12px;
        max-height: 220px;
        overflow: auto;
        white-space: pre-wrap;
      }

      @media (max-width: 940px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1 class="title">moon_swash Shaping Demo</h1>
      <p class="sub">
        Input text, choose script, direction, and font, then render SVG output.
      </p>

      <section class="grid">
        <div class="panel">
          <label class="label" for="text">Text</label>
          <textarea id="text">السَّلَامُ عَلَيْكُمْ</textarea>

          <div class="row">
            <div>
              <label class="label" for="size">Size</label>
              <input id="size" type="number" min="6" max="200" step="1" value="18" />
            </div>
            <div>
              <label class="label" for="script">Script</label>
              <select id="script">
                <option value="arabic">Arabic</option>
                <option value="latin">Latin</option>
                <option value="hebrew">Hebrew</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div>
              <label class="label" for="font-preset">Font</label>
              <select id="font-preset"></select>
            </div>
            <div>
              <label class="label" for="direction">Direction</label>
              <select id="direction">
                <option value="rtl">RTL</option>
                <option value="ltr">LTR</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div>
              <label class="label" for="font">Custom Font File (TTF/OTF/TTC)</label>
              <input id="font" type="file" accept=".ttf,.otf,.ttc" />
            </div>
            <div>
              <label class="label" for="font-license-link">License</label>
              <p class="meta" style="margin-top: 0">
                <a id="font-license-link" href="./assets/NotoNaskhArabic-OFL.txt" target="_blank" rel="noreferrer"
                  >OFL-1.1</a
                >
              </p>
            </div>
          </div>

          <div class="actions">
            <button id="render" type="button">Render SVG</button>
            <button id="download" type="button" disabled>Download SVG</button>
          </div>

          <p class="meta" id="font-meta">
            Current font: Noto Naskh Arabic (Bundled)
          </p>
        </div>

        <div class="panel">
          <div class="status" id="status">Ready.</div>
          <div class="viewer" id="viewer"></div>
          <pre class="code" id="raw"></pre>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
